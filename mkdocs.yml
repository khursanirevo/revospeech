site_name: RevoSpeech
site_description: A unified Python library for speech AI — ASR, TTS, and speech restoration using open models.
site_url: https://khursanirevo.github.io/revospeech/
repo_url: https://github.com/khursanirevo/revospeech
repo_name: khursanirevo/revospeech
edit_uri: edit/master/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - CLI Reference: cli.md
  - Configuration: configuration.md
  - Extension Guide: extension.md
  - Model Catalog: models.md
  - Models:
      - vits-ms: models/vits-ms.md
      - revovoice: models/revovoice.md
      - sidon: models/sidon.md
  - Speech Restoration: util.md
  - API Reference:
      - Overview: api.md
      - ASR: api/asr.md
      - TTS: api/tts.md
      - Util: api/util.md
      - Registry: api/registry.md
      - Result Types: api/results.md
      - CLI: api/cli.md
  - Troubleshooting: troubleshooting.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            show_bases: true

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/khursanirevo/revospeech
